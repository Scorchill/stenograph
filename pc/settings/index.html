<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stenograph Settings</title>
    <link rel="stylesheet" href="/settings/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Stenograph</h1>
        </div>

        <div class="section">
            <h2>Pair Your Phone</h2>
            <p class="section-desc">Scan this QR code with the Stenograph app on your phone</p>
            <img id="qr-code" src="/api/pairing/qr" alt="QR Code" class="qr-code" />
            <button id="btn-regenerate" class="btn btn-secondary">Regenerate Token</button>
        </div>

        <div class="section">
            <h2>Status</h2>
            <div class="status-card">
                <div class="status-row">
                    <span class="status-label">Connection</span>
                    <span class="status-value" id="connection-status">Checking...</span>
                </div>
            </div>
        </div>

        <div class="section">
            <h2>Options</h2>
            <label class="toggle">
                <input type="checkbox" id="toggle-enabled" checked>
                <span>Pause Typing</span>
                <span class="toggle-desc">When paused, incoming speech is ignored</span>
            </label>
            <label class="toggle">
                <input type="checkbox" id="toggle-terminal">
                <span>Terminal Mode</span>
                <span class="toggle-desc">Press Enter after each final transcription</span>
            </label>
        </div>

        <div id="status-message" class="status-message"></div>
    </div>
    <script src="/settings/app.js"></script>
</body>
</html>
